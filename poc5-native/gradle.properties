# POC 5 Jalon 3: the compilation now spans ui + foundation + animation from source,
# so give the Gradle and Kotlin daemons room (host has 64 GB).
org.gradle.jvmargs=-Xmx8g -XX:MaxMetaspaceSize=1g
kotlin.daemon.jvmargs=-Xmx8g
kotlin.native.ignoreDisabledTargets=true
# The GLFW cinterop is used from linuxMain, shared by linuxArm64 + linuxX64: commonize it so the
# `glfw.*` bindings resolve in the shared source set instead of only in the per-target leaves.
kotlin.mpp.enableCInteropCommonization=true
